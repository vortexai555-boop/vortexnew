version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: vortex-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: vortexpass123
      MONGO_INITDB_DATABASE: vortex_ai
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - vortex-network

  redis:
    image: redis:alpine
    container_name: vortex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vortex-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vortex-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:vortexpass123@mongodb:27017/vortex_ai?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-key-change-this}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    networks:
      - vortex-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vortex-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - vortex-network

volumes:
  mongodb_data:
  redis_data:

networks:
  vortex-network:
    driver: bridge
